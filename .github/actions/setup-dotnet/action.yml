name: 'Setup .NET'

runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        dotnet-version: |
          9.0.x
          8.0.x

    - name: Setup .NET x64
      if: runner.os == 'Windows' && runner.arch == 'ARM64'
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        dotnet-version: |
          9.0.x
          8.0.x
        architecture: x64
