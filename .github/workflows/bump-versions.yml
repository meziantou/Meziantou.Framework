on:
  workflow_dispatch:
  schedule:
  - cron: '0 0 * * 0' # once a week

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

defaults:
  run:
    shell: pwsh

jobs:
  update_file:
    runs-on: windows-2025
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: ./.github/setup-dotnet
      - run: dotnet run ./eng/update-versions.cs -- --create-pull-request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}