name: publish
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NuGetDirectory: ${{ github.workspace}}/nuget
  NuGetSource: "https://api.nuget.org/v3/index.json"

defaults:
  run:
    shell: pwsh

jobs:
  build_eng_scripts:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Build eng scripts
        run: |
          Get-ChildItem ./eng/*.cs | ForEach-Object {
            Write-Host "Building $_"
            dotnet build $_
            if ($LASTEXITCODE -ne 0) { throw "Failed to build $_" }
          }

  validate_bom:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Validate Code
        run: dotnet run ./eng/update-bom.cs

  validate_readme:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Validate Readme
        run: dotnet run ./eng/update-readme.cs

  validate_test_projects:
    runs-on: windows-2025
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Validate
        run: dotnet run ./eng/validate-testprojects-configuration.cs

  validate_trimmable_projects:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Validate
        run: dotnet run ./eng/update-trimmable.cs

  create_nuget:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      has-project: ${{ steps.package-project.outputs.has-project }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ case(github.event_name == 'pull_request', 0, 1) }}
      - run: git config --global protocol.file.allow always
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Generate delta build file
        id: package-project
        uses: ./.github/actions/deltabuild
        with:
          input-project: eng/packages.proj
          output-project: eng/packages.delta.proj
          run-generate: ${{ case(github.event_name == 'pull_request', 'true', 'false') }}
          full-rebuild-triggers: |
            .github/workflows/ci.yml
            eng/**/*.proj

      - run: dotnet build ${{ steps.package-project.outputs.project }} --configuration Release /p:IsOfficialBuild=true /bl:build.binlog -warnaserror
        if: steps.package-project.outputs.has-project == 'true'

      - name: Prepare NuGet artifact directory
        run: |
          New-Item -ItemType Directory -Path "${{ env.NuGetDirectory }}" -Force | Out-Null
          Set-Content -Path "${{ env.NuGetDirectory }}/artifact-placeholder.txt" -Value "placeholder"
      - run: dotnet pack ${{ steps.package-project.outputs.project }} --configuration Release /p:IsOfficialBuild=true --output ${{ env.NuGetDirectory }} /p:RepositoryBranch="${{github.ref}}" "/p:PromptFolder=${{runner.temp}}/prompt" /bl:pack.binlog
        if: steps.package-project.outputs.has-project == 'true'

      - name: Skip packaging
        if: steps.package-project.outputs.has-project != 'true'
        run: Write-Host "No package project was impacted. Skipping build and pack."
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 3
          path: ${{ env.NuGetDirectory }}/**/*
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: binlog
          if-no-files-found: ${{ case(steps.package-project.outputs.has-project == 'true', 'error', 'warn') }}
          retention-days: 3
          path: '**/*.binlog'

  validate_nuget:
    runs-on: ubuntu-24.04
    needs: [ create_nuget ]
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - uses: actions/download-artifact@v8
        if: needs.create_nuget.outputs.has-project == 'true'
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}
      - name: Validate NuGet packages
        if: needs.create_nuget.outputs.has-project == 'true'
        run: dotnet run ./eng/validate-nuget.cs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_VALIDATION_IS_DELTA: ${{ case(github.event_name == 'pull_request' && needs.create_nuget.outputs.has-project == 'true', 'true', 'false') }}

  build_and_test:
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    env:
      TestResultsDirectory: ${{ github.workspace}}/TestResults
    strategy:
      matrix:
        # x64, arm64
        runs-on: [ windows-2025, ubuntu-24.04, ubuntu-24.04-arm, macos-15 ]
        configuration: [ Debug, Release ]
        additionalArguments: [ "", "/p:InvariantGlobalization=true" ]
      fail-fast: false
    steps:
      - id: compute-artifact-name
        name: Compute artifact name
        run: |
          $Name = "test-results-${{ matrix.runs-on }}-${{ matrix.configuration }}-${{matrix.additionalArguments}}".Replace(":", "_").Replace("/", "_")
          "artifact-name=$Name" >> $env:GITHUB_OUTPUT
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ case(github.event_name == 'pull_request', 0, 1) }}
      - run: git config --global protocol.file.allow always

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Generate delta build file
        id: build-project
        uses: ./.github/actions/deltabuild
        with:
          input-project: eng/build.proj
          output-project: eng/delta.proj
          run-generate: ${{ case(github.event_name == 'pull_request', 'true', 'false') }}
          full-rebuild-triggers: |
            .github/workflows/ci.yml
            eng/**/*.proj

      - name: PATH
        if: steps.build-project.outputs.has-project == 'true'
        run: echo $env:PATH

      - name: .NET info
        if: steps.build-project.outputs.has-project == 'true'
        run: dotnet --info

      - name: Enable ProjFS
        if: startsWith(matrix.runs-on, 'windows') && steps.build-project.outputs.has-project == 'true'
        run: |
          $feature = Get-WindowsOptionalFeature -Online -FeatureName Client-ProjFS
          if ($feature.State -ne 'Enabled') {
            Enable-WindowsOptionalFeature -Online -FeatureName Client-ProjFS -NoRestart
          }

      - name: Build
        if: steps.build-project.outputs.has-project == 'true'
        run: dotnet build ${{ steps.build-project.outputs.project }} --configuration ${{ matrix.configuration }} /bl /p:IsLinuxArm64=${{ matrix.runs-on == 'ubuntu-24.04-arm' }} ${{ matrix.additionalArguments }}

      - name: List environment variables
        if: steps.build-project.outputs.has-project == 'true'
        run: "Get-ChildItem env: | Sort-Object Name"

      - name: Run tests
        if: steps.build-project.outputs.has-project == 'true'
        run: dotnet test ${{ steps.build-project.outputs.project }} --configuration ${{ matrix.configuration }} --no-build --results-directory "${{ env.TestResultsDirectory }}" /p:IsLinuxArm64=${{ matrix.runs-on == 'ubuntu-24.04-arm' }} ${{ matrix.additionalArguments }}

      - uses: actions/upload-artifact@v7
        if: always() && steps.build-project.outputs.has-project == 'true'
        with:
          name: ${{ steps.compute-artifact-name.outputs.artifact-name }}
          if-no-files-found: ${{ case(steps.build-project.outputs.project == 'eng/delta.proj', 'warn', 'error') }}
          retention-days: 3
          path: |
            !**/*.coverage
            **/*.binlog
            ${{ env.TestResultsDirectory }}/**/*

      - uses: actions/upload-artifact@v7
        if: always() && steps.build-project.outputs.has-project == 'true'
        with:
          name: ${{ steps.compute-artifact-name.outputs.artifact-name }}-coverage
          if-no-files-found: ${{ case(steps.build-project.outputs.project == 'eng/delta.proj', 'warn', 'error') }}
          retention-days: 3
          path: |
            **/*.coverage

  test_trimming:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      matrix:
        # https://docs.microsoft.com/en-us/dotnet/core/rid-catalog
        runtime: [ "win-x64", "linux-x64", "osx-x64" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - run: dotnet publish --configuration Release --runtime ${{ matrix.runtime }} --self-contained tests/Trimmable/Trimmable.csproj

  test_trimming_wpf:
    runs-on: windows-2025
    timeout-minutes: 60
    strategy:
      matrix:
        runtime: [ "win-x64" ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - run: dotnet publish --configuration Release --runtime ${{ matrix.runtime }} --self-contained tests/Trimmable.Wpf/Trimmable.Wpf.csproj

  merge_coverage:
    runs-on: ubuntu-24.04
    needs: [build_and_test]
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - name: Install dotnet-coverage
        run: dotnet tool update --global dotnet-coverage
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*-coverage
          path: test-results
      # Delta builds can legitimately produce no .coverage files. In that case,
      # skip merge commands and allow the upload step to warn instead of failing.
      - name: Merge coverage files (format coverage)
        if: ${{ hashFiles('test-results/**/*.coverage') != '' }}
        run: dotnet-coverage merge --output test-result.coverage --output-format coverage (Get-ChildItem test-results -Recurse -Filter "*.coverage")
      - name: Merge coverage files (format cobertura)
        if: ${{ hashFiles('test-results/**/*.coverage') != '' }}
        run: dotnet-coverage merge --output test-result.cobertura.xml --output-format cobertura (Get-ChildItem test-results -Recurse -Filter "*.coverage")
      - uses: actions/upload-artifact@v7
        with:
          name: code-coverage
          if-no-files-found: warn
          retention-days: 3
          path: |
            test-result.coverage
            test-result.cobertura.xml

  deploy:
    runs-on: ubuntu-24.04
    needs: [ build_eng_scripts, validate_bom, validate_readme, validate_test_projects, validate_trimmable_projects, validate_nuget, build_and_test, test_trimming, test_trimming_wpf ]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet
      - uses: actions/download-artifact@v8
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: meziantou

      - run: |
          Write-Host "Current ref: $env:GITHUB_REF"
          Write-Host "Searching nupkg in folder: ${{ env.NuGetDirectory }}"
          $files = Get-ChildItem "${{ env.NuGetDirectory }}/*" -Include *.nupkg
          foreach($file in $files) {
              Write-Host "Pushing NuGet package: $($file.FullName)"
              if ($env:GITHUB_REF -eq 'refs/heads/main')
              {
                & dotnet nuget push "$($file.FullName)" --api-key "$env:NUGETAPIKEY" --source ${{ env.NuGetSource }} --force-english-output --skip-duplicate
              }
              else
              {
                & dotnet nuget push "$($file.FullName)" --api-key "$env:FEEDZ_APIKEY" --source "https://f.feedz.io/meziantou/meziantou-framework/nuget/index.json" --force-english-output --skip-duplicate
              }
          }
        name: Publish NuGet packages
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        env:
          NUGETAPIKEY: ${{steps.login.outputs.NUGET_API_KEY}}
          FEEDZ_APIKEY: ${{ secrets.FEEDZ_APIKEY }}
